server {
    listen 80;
    server_name _;
    # Redirige todo el tráfico HTTP a HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # ── SSL ──────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Ocultar versión nginx (LOW: HTTP Header Information Disclosure) ──
    server_tokens off;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ─────────────────────────────────────
    # LOW: Missing X-Frame-Options
    add_header X-Frame-Options "DENY" always;

    # LOW: Missing X-Content-Type-Options
    add_header X-Content-Type-Options "nosniff" always;

    # LOW: Missing Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://modeloserviciociudadania.shinyapps.io https://*.run.app; frame-src https://modeloserviciociudadania.shinyapps.io; base-uri 'self'; form-action 'self';" always;

    # LOW: Missing Permissions Policy
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # LOW: Missing Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HIGH: HTTPS Not Detected → HSTS fuerza HTTPS en futuros accesos
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Cache-Control (LOW: Missing Cache-Control Header) ────
    # HTML: nunca almacenar en caché
    location ~* \.html?$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://modeloserviciociudadania.shinyapps.io https://*.run.app; frame-src https://modeloserviciociudadania.shinyapps.io; base-uri 'self'; form-action 'self';" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri $uri/ /index.html;
    }

    # Assets estáticos con hash en el nombre: cache larga
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri =404;
    }

    # ── security.txt (LOW: Security.txt File Not Detected) ──
    location = /.well-known/security.txt {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    # ── Reverse proxy → backend (puerto 8080) ───────────────
    # El backend queda en red interna; no se expone directamente al exterior
    location /auth/ {
        proxy_pass         http://backend:8080/auth/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /users/ {
        proxy_pass         http://backend:8080/users/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /seguimiento/ {
        proxy_pass         http://backend:8080/seguimiento/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /reports/ {
        proxy_pass         http://backend:8080/reports/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /pqrds/ {
        proxy_pass         http://backend:8080/pqrds/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /habilidades/ {
        proxy_pass         http://backend:8080/habilidades/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /files/ {
        proxy_pass         http://backend:8080/files/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    location /uploads/ {
        proxy_pass         http://backend:8080/uploads/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /healthz {
        proxy_pass         http://backend:8080/healthz;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SPA fallback ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Gzip ─────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;
}